# Builds the WASM artifact and commits dist/ (the ammo.js pattern: build in CI, commit
# the binary). Pin the emsdk version so builds are reproducible.
name: build

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'cpp/**'
      - 'CMakeLists.txt'
      - 'vendor/**'
      - '.github/workflows/build.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup emsdk
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.61 # TODO: pin a version known to build upstream msdfgen + FreeType port

      # FreeType ships as an Emscripten port; build it and point find_package at its
      # cached headers/lib so msdfgen's `find_package(Freetype REQUIRED)` succeeds.
      - name: Build FreeType port & locate
        run: |
          embuilder build freetype
          SYSROOT="$(em-config CACHE)/sysroot"
          echo "sysroot: $SYSROOT"
          find "$SYSROOT" \( -name 'ft2build.h' -o -name 'libfreetype*.a' \) | sort
          FT2BUILD="$(find "$SYSROOT" -name 'ft2build.h' | head -1)"
          echo "FT_INC=$(dirname "$FT2BUILD")" >> "$GITHUB_ENV"
          echo "FT_LIB=$(find "$SYSROOT" -name 'libfreetype.a' | head -1)" >> "$GITHUB_ENV"

      - name: Configure & build
        run: |
          emcmake cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DFREETYPE_LIBRARY="$FT_LIB" \
            -DFREETYPE_INCLUDE_DIRS="$FT_INC" \
            -DFREETYPE_INCLUDE_DIR_ft2build="$FT_INC" \
            -DFREETYPE_INCLUDE_DIR_freetype2="$FT_INC"
          cmake --build build --verbose

      # (TS loader build re-added once the loader is finalized + a package-lock exists.)

      - name: Commit artifacts
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'build: update wasm + loader artifacts'
          file_pattern: 'dist/*'
